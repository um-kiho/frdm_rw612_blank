CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_BT_DEVICE_NAME="zCubeTarget"

# CSPRNG: use hardware TRNG directly so the PSA crypto provider
# (random_psa.c -> psa/crypto.h, plus host-only -lws2_32/-lbcrypt deps from
# tf-psa-crypto) is not pulled into the cross build.
CONFIG_HARDWARE_DEVICE_CS_GENERATOR=y


# CONFIG_BUILD_ONLY_NO_BLOBS was removed: it caused rw61x_cpu2_fw.bin.inc to be 0 bytes,
# preventing BLE radio initialization entirely.
CONFIG_BT_SHELL=n

# Radar UART: DMA async (FC0, DMA0 채널 0/1)
CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y

# NVS (Non-Volatile Storage) — replaces NXP mflash file API
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
# Auto-erase NVS partition if flash contains non-NVS data (e.g. factory firmware)
CONFIG_NVS_INIT_BAD_MEMORY_REGION=y

# I2C for sensors (BH1750, AMG8833)
CONFIG_I2C=y

# Networking (Zephyr native sockets)
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y

# WiFi support — RW612 NXP driver
CONFIG_WIFI=y
CONFIG_WIFI_NXP=y
CONFIG_NXP_RW610=y
CONFIG_ETH_DRIVER=n

# NXP WiFi + BT Classic A2DP 버퍼/펌웨어 로딩에 큰 힙이 필요
CONFIG_HEAP_MEM_POOL_SIZE=204800

# WiFi mgmt 이벤트 큐/스택 (부족하면 CONNECT_RESULT 이벤트 유실)
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4608

# 네트워크 버퍼
# OTA 다운로드 막판 정지 원인: TCP 수신 윈도우 자동산출값이 너무 작음.
#   auto = (NET_BUF_RX_COUNT * NET_BUF_DATA_SIZE) / 3 = (20*128)/3 ≈ 853 B
# 853 B는 WiFi MSS(~1460 B)보다 작아 Silly Window Syndrome / flow-control 정지를
# 유발. 윈도우를 8 KB로 고정하고 RX 버퍼를 늘려 느린 flash 소비 중에도 세그먼트를
# 흡수하도록 한다.
# 버퍼 한 개를 256 B로 키워(기본 128) 윈도우를 채우는 데 필요한 net_buf 개수를 줄인다.
# OTA 막판 99% 정지의 핵심: 서버(파이썬 HTTP/1.0)가 응답 끝에서 마지막 ~8 KB를 한 번에
# 보내며 close하는데, 수신 윈도우(8192)가 그 버스트로 정확히 0까지 차면 window-update가
# 안 나가 tail zero-window 교착 → recv 영구 블록. 윈도우를 16 KB로 올려 마지막 버스트가
# 와도 0에 닿지 않게 하고, 버퍼는 윈도우(64개분)의 2배(128)로 여유를 둔다.
CONFIG_NET_BUF_DATA_SIZE=256
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=16384

# ── Matter hub용 Thread (OpenThread RCP host) ──────────────────────────────
# RW612 온칩 802.15.4 라디오는 NBU(companion controller)에서 RCP 펌웨어로 동작하고,
# M33 호스트가 내부 HDLC 인터페이스로 OpenThread 풀스택을 구동한다. DT 매핑은 SoC
# dtsi에 이미 존재(chosen zephyr,hdlc-rcp-if = &hdlc_rcp_if). BT/WiFi가 이미 켜져
# 있어 monolithic NBU 콤보 펌웨어(BLE+WiFi+15.4)·IMU·FW_LOADER 경로는 이미 활성.
# 선행: west.yml에 openthread 추가 + `west update` (modules/lib/openthread fetch).
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_SOURCES=y
# 허브/라우터 역할(리더·라우터 승격 가능) → Full Thread Device
CONFIG_OPENTHREAD_FTD=y
# 내부 HDLC RCP 호스트 인터페이스 + NBU RF/펌웨어 로더
CONFIG_HDLC_RCP_IF=y
CONFIG_NXP_RF_IMU=y
CONFIG_NXP_FW_LOADER=y
# WiFi 부팅을 방해하지 않도록 자동 기동 끄고, matter_hub_init()에서 openthread_run()으로 직접 기동
CONFIG_OPENTHREAD_MANUAL_START=y
CONFIG_OPENTHREAD_RCP_RESTORATION_MAX_COUNT=10
# radio_spinel.cpp / hdlc_interface.cpp 는 C++
CONFIG_CPP=y
# OpenThread 데이터셋 영속화(이미 NVS 사용 중)
CONFIG_SETTINGS=y
# OpenThread 크립토용 PSA RNG (frdm_rw612 OT 레퍼런스 동일)
CONFIG_MBEDTLS_PSA_CRYPTO_LEGACY_RNG=y
# mbedtls 정적 버퍼 할당기 힙. OT_CRYPTO_PSA 기본값 1024는 런타임에 부족해
# psa_cipher_encrypt(AES-ECB)가 PSA_ERROR_INSUFFICIENT_MEMORY(-141)로 실패하며
# aes_ecb.cpp 에서 ASSERT(멈춤)가 났다(검증됨). OT MAC AES-CCM + 동시 할당
# 여유를 위해 8 KB로 상향(정적 BSS, RAM 여유 충분).
CONFIG_MBEDTLS_HEAP_SIZE=8192

# OT 스레드 스택. 기본 3072는 mbedtls *소프트웨어* AES-CCM/PSA crypto 호출
# 깊이에 부족 → 스택 오버플로로 인접 메모리 파손, 시스템 전체 정지(검증됨:
# AES-ECB 통과 후 BH1750 단계에서 완전 멈춤). 8 KB로 상향.
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=8192
# spinel 라디오 RX 워크큐 스택. 기본 512는 프레임 처리/콜백에 빠듯 → 2 KB.
CONFIG_OPENTHREAD_RADIO_WORKQUEUE_STACK_SIZE=2048

# Build output formats
CONFIG_BUILD_OUTPUT_HEX=y
CONFIG_BUILD_OUTPUT_BIN=y

# OTA secondary-slot write buffer
CONFIG_IMG_BLOCK_BUF_SIZE=1024
CONFIG_STREAM_FLASH=y

# MCUboot 연동: 앱을 slot0(image-0) 서명 이미지로 빌드하고, OTA commit 시
# boot_request_upgrade()로 slot1(image-1)을 다음 부팅에 swap 요청한다.
# 필수 선행: west.yml에 mcuboot 추가 + `west update`(모듈 fetch) + 0x0에 부트로더 플래시.
# 이 설정을 켜면 앱은 slot0(0x20000)용으로 빌드되어 0x0 부트로더 없이는 단독 부팅 불가.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
# 앱 이미지를 부트로더와 동일한 기본 키(root-rsa-2048.pem)로 서명한다.
# 이게 있어야 빌드가 zephyr.signed.{hex,bin}을 생성하고, MCUboot가 slot0/slot1을 검증·부팅한다.
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="C:/work/New_zCube/rw612_zephyr/bootloader/mcuboot/root-rsa-2048.pem"


# IR TX: SCTimer PWM 캐리어 (38 kHz, SCT_OUT5 = GPIO27)
CONFIG_PWM=y

# SK6812 RGBW LED strip (ws2812-gpio single-wire bit-bang on GPIO46)
CONFIG_LED_STRIP=y
# APA102 선택 시 주석 해제 → GPIO47(DATA), GPIO48(CLK) 로 전환
# CONFIG_APP_LED_APA102=y

# Logging Configuration
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
# OTA가 실행 중인 FlexSPI flash(slot1)에 기록할 때, deferred 로깅 경로에서는
# 시스템 전체가 hang(radar/IR 포함 전부 정지)한다. immediate(동기) 로그로 전환하면
# OTA가 100% 완주한다(검증됨). 따라서 deferred 전용 옵션은 비활성.
# CONFIG_LOG_BUFFER_SIZE=8192
# CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=10
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_PRINTK=n
CONFIG_REBOOT=y
CONFIG_EXCEPTION_DEBUG=y
CONFIG_EXTRA_EXCEPTION_INFO=y
CONFIG_ASSERT=y

# Multitasking Configuration
CONFIG_MULTITHREADING=y
CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=10

# Stack sizes — debug 빌드는 -O0/-Og 로 인해 release 대비 2~3× 더 필요
# 0xDEAD (스택 오버플로우) 방지를 위해 증가
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_IDLE_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=8192
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TCP_WORKQ_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=32768
CONFIG_BT_RX_STACK_SIZE=32768


# Audio: ES8388 I2C 볼륨/뮤트 제어 전용 (I2S 미사용 — 오디오 재생은 ESP32-A1S 담당)
# A2DP 불가: Zephyr hal_nxp에 BT Classic 펌웨어 블롭 없음 (BLE 전용만 제공)
CONFIG_BT_MAX_CONN=4
CONFIG_BT_LONG_WQ_STACK_SIZE=8192

# I2C 센서 활성화: BH1750 + 열화상 센서 물리 연결 후 y로 변경
CONFIG_APP_SENSORS_ENABLE=y
# 열화상 센서 택1 (둘 중 하나만):
# CONFIG_APP_THERMAL_AMG8833=y
CONFIG_APP_THERMAL_MLX90640=y
# CONFIG_APP_THERMAL_NONE=y

# I2C 전송 타임아웃 (ms). 기본값 0 = 무한 대기 → 하드웨어 없을 때 영구 hang.
# 100 ms = 400 kHz I2C 정상 전송보다 충분히 크고, hang 대기보다 훨씬 짧음.
CONFIG_I2C_NXP_TRANSFER_TIMEOUT=100

# ES8388 오디오 코덱 활성화: FC2 I2C(GPIO16/17, addr=0x10) 물리 연결 후 y로 변경
# CONFIG_APP_AUDIO_ES8388=y

# Thread Options
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_MONITOR=y
CONFIG_INIT_STACKS=y
