
manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: main
      import:
        name-allowlist:
          - cmsis
          - cmsis_6
          - hal_nxp
          - mbedtls
          - tf-psa-crypto
          - libsbc
          - mcuboot
          # Matter hub용 Thread: OpenThread 라이브러리 소스.
          # 추가 후 반드시 `west update` 로 modules/lib/openthread 를 fetch.
          - openthread
